<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Estadística Mensual')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="card">
        <h2>Estadísticas</h2>
        <!-- Filtro por Mes y Año -->
        <form th:action="@{/statistics/monthly}" method="get" style="margin-bottom: 20px;">
            <div class="form-row">
                <div class="form-field">
                    <label>Mes</label>
                    <select name="month">
                        <option value="1" th:selected="${selectedMonth == 1}">Enero</option>
                        <option value="2" th:selected="${selectedMonth == 2}">Febrero</option>
                        <option value="3" th:selected="${selectedMonth == 3}">Marzo</option>
                        <option value="4" th:selected="${selectedMonth == 4}">Abril</option>
                        <option value="5" th:selected="${selectedMonth == 5}">Mayo</option>
                        <option value="6" th:selected="${selectedMonth == 6}">Junio</option>
                        <option value="7" th:selected="${selectedMonth == 7}">Julio</option>
                        <option value="8" th:selected="${selectedMonth == 8}">Agosto</option>
                        <option value="9" th:selected="${selectedMonth == 9}">Septiembre</option>
                        <option value="10" th:selected="${selectedMonth == 10}">Octubre</option>
                        <option value="11" th:selected="${selectedMonth == 11}">Noviembre</option>
                        <option value="12" th:selected="${selectedMonth == 12}">Diciembre</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Año</label>
                    <select name="year">
                        <option th:each="y : ${#numbers.sequence(2016, #temporals.year(#temporals.createNow()) + 1)}" 
                                th:value="${y}" 
                                th:text="${y}" 
                                th:selected="${selectedYear == y}"></option>
                    </select>
                </div>
            </div>
            <button type="submit">Filtrar por Mes</button>
        </form>

        <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

        <!-- Filtro por Rango Personalizado -->
        <form th:action="@{/statistics/monthly}" method="get">
            <div class="form-row">
                <div class="form-field">
                    <label>Inicio (Rango libre)</label>
                    <input type="date" name="start" th:value="${start != null ? #temporals.format(start, 'yyyy-MM-dd') : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                </div>
                <div class="form-field">
                    <label>Fin (Rango libre)</label>
                    <input type="date" name="end" th:value="${end != null ? #temporals.format(end, 'yyyy-MM-dd') : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                </div>
            </div>
            <button type="submit">Filtrar por Rango</button>
        </form>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>Montos</h3>
            <p style="color: #666; margin-top: -10px; margin-bottom: 15px; font-size: 0.9em;">
                Periodo: <span th:text="${#temporals.format(start, 'dd/MM/yyyy')}"></span> al <span th:text="${#temporals.format(end, 'dd/MM/yyyy')}"></span>
            </p>
            <p>Prendas vendidas: <strong th:text="${stats.totalItemsCount}">0</strong></p>
            <p>Total cobros:
                <strong th:text="${T(cl.casero.migration.util.CurrencyUtil).format(stats.paymentsCount)}">$0</strong>
            </p>
            <p>Total ventas:
                <strong th:text="${T(cl.casero.migration.util.CurrencyUtil).format(stats.salesCount)}">$0</strong>
            </p>
        </div>
        <!-- <div class="card">
            <h3>Tarjetas</h3>
            <p>Terminadas: <strong th:text="${stats.finishedCardsCount}">0</strong></p>
            <p>Nuevas: <strong th:text="${stats.newCardsCount}">0</strong></p>
            <p>Mantenciones: <strong th:text="${stats.maintenanceCount}">0</strong></p>
        </div> -->
    </div>

    <div class="card stats-tools-card">
        <h3>Acciones</h3>
        <div class="stats-links">
            <a class="stats-link" th:href="@{/customers/ranking}">
                <span aria-hidden="true">🏅</span>
                <span>Ranking de clientes</span>
            </a>
        </div>
    </div>
</div>
</body>
</html>
